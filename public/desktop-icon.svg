<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d96a"/>
      <stop offset="50%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#c9a830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="#0c0e14"/>

  <!-- Corner brackets -->
  <!-- Top-left -->
  <path d="M48 100 L48 52 L96 52" stroke="#e8c547" stroke-width="4" stroke-linecap="square" fill="none"/>
  <!-- Top-right -->
  <path d="M416 52 L464 52 L464 100" stroke="#e8c547" stroke-width="4" stroke-linecap="square" fill="none"/>
  <!-- Bottom-left -->
  <path d="M48 412 L48 460 L96 460" stroke="#e8c547" stroke-width="4" stroke-linecap="square" fill="none"/>
  <!-- Bottom-right -->
  <path d="M416 460 L464 460 L464 412" stroke="#e8c547" stroke-width="4" stroke-linecap="square" fill="none"/>

  <!-- "SISTEMA" text -->
  <text x="256" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="400" letter-spacing="14" fill="#e8c547">SISTEMA</text>

  <!-- Large "I" letter -->
  <rect x="138" y="162" width="52" height="228" rx="2" fill="url(#goldGrad)"/>

  <!-- Large "L" letter -->
  <rect x="228" y="162" width="52" height="228" rx="2" fill="url(#goldGrad)"/>
  <rect x="228" y="340" width="148" height="50" rx="2" fill="url(#goldGrad)"/>

  <!-- Horizontal line above IRONLIFTING -->
  <line x1="80" y1="418" x2="432" y2="418" stroke="#e8c547" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- "IRONLIFTING" text -->
  <text x="256" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" letter-spacing="10" fill="#e8c547">IRONLIFTING</text>
</svg>
