<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d96a"/>
      <stop offset="50%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#b8941e"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d96a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#e8c547" stop-opacity="0"/>
      <stop offset="100%" stop-color="#b8941e" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Subtle border -->
  <rect x="3" y="3" width="506" height="506" rx="93" fill="none" stroke="#e8c547" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Barbell / Stylized I - representing IRONLIFTING -->

  <!-- Top plate left -->
  <rect x="120" y="108" width="56" height="80" rx="6" fill="url(#goldGradient)"/>
  <!-- Top plate right -->
  <rect x="336" y="108" width="56" height="80" rx="6" fill="url(#goldGradient)"/>

  <!-- Top bar (connecting plates) -->
  <rect x="160" y="128" width="192" height="40" rx="4" fill="url(#goldGradient)"/>

  <!-- Center vertical bar -->
  <rect x="224" y="168" width="64" height="176" rx="4" fill="url(#goldGradient)"/>

  <!-- Bottom bar (connecting plates) -->
  <rect x="160" y="344" width="192" height="40" rx="4" fill="url(#goldGradient)"/>

  <!-- Bottom plate left -->
  <rect x="120" y="324" width="56" height="80" rx="6" fill="url(#goldGradient)"/>
  <!-- Bottom plate right -->
  <rect x="336" y="324" width="56" height="80" rx="6" fill="url(#goldGradient)"/>

  <!-- Shine overlay on top bar -->
  <rect x="160" y="128" width="192" height="20" rx="4" fill="url(#goldShine)"/>
  <!-- Shine overlay on vertical bar -->
  <rect x="224" y="168" width="32" height="176" rx="4" fill="url(#goldShine)"/>
</svg>
